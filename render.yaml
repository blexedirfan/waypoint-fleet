services:
  - type: web
    name: waypoint-fleet-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: HOWEN_WEBHOOK_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://waypoint-fleet.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: waypoint-fleet-db
          property: connectionString

databases:
  - name: waypoint-fleet-db
    plan: free
    databaseName: waypoint_fleet
    user: waypoint
