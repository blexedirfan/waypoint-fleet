<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#EDEFF4"/>
      <stop offset="100%" stop-color="#C8CBD4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="38%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2D8EE" stop-opacity="0.88"/>
      <stop offset="55%" stop-color="#74A4CC" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#4278A0" stop-opacity="0.68"/>
    </linearGradient>
    <radialGradient id="rim" cx="36%" cy="33%" r="68%">
      <stop offset="0%" stop-color="#B0BBC8"/>
      <stop offset="48%" stop-color="#586272"/>
      <stop offset="100%" stop-color="#10141A"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
