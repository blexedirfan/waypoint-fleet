<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8EF5"/>
      <stop offset="35%" stop-color="#3F6FE0"/>
      <stop offset="100%" stop-color="#1A3A8A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2D8F2" stop-opacity="0.90"/>
      <stop offset="55%" stop-color="#74A8D2" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#4278A4" stop-opacity="0.68"/>
    </linearGradient>
    <radialGradient id="rim" cx="36%" cy="33%" r="68%">
      <stop offset="0%" stop-color="#A8B8CC"/>
      <stop offset="48%" stop-color="#506070"/>
      <stop offset="100%" stop-color="#0C1018"/>
    </radialGradient>
    <linearGradient id="bodyGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3F6FE0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3F6FE0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3F6FE0" stop-opacity="0"/>
    </linearGradient>
  </defs>

