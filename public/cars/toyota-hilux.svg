  <circle cx="188" cy="295" r="56" fill="#080C12"/>
  <circle cx="188" cy="295" r="39" fill="url(#rim)"/>
  <line x1="188" y1="260" x2="188" y2="273" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="188" y1="317" x2="188" y2="330" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="153" y1="295" x2="166" y2="295" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="210" y1="295" x2="223" y2="295" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="163" y1="270" x2="172.5" y2="279.5" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="203.5" y1="310.5" x2="213" y2="320" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="163" y1="320" x2="172.5" y2="310.5" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="203.5" y1="279.5" x2="213" y2="270" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <circle cx="188" cy="295" r="12" fill="#C4CDD8"/>
  <circle cx="188" cy="295" r="6" fill="#6A7888"/>
  <path d="M 135 268 A 56 56 0 0 1 172 252" fill="none" stroke="#fff" stroke-width="3.5" stroke-opacity="0.10" stroke-linecap="round"/>

  <!-- REAR WHEEL -->
  <circle cx="680" cy="295" r="64" fill="#0C1018"/>
  <circle cx="680" cy="295" r="56" fill="#080C12"/>
  <circle cx="680" cy="295" r="39" fill="url(#rim)"/>
  <line x1="680" y1="260" x2="680" y2="273" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="680" y1="317" x2="680" y2="330" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="645" y1="295" x2="658" y2="295" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="702" y1="295" x2="715" y2="295" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="655" y1="270" x2="664.5" y2="279.5" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="695.5" y1="310.5" x2="705" y2="320" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="655" y1="320" x2="664.5" y2="310.5" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <line x1="695.5" y1="279.5" x2="705" y2="270" stroke="#9AAABB" stroke-width="6" stroke-linecap="round"/>
  <circle cx="680" cy="295" r="12" fill="#C4CDD8"/>
  <circle cx="680" cy="295" r="6" fill="#6A7888"/>
  <path d="M 627 268 A 56 56 0 0 1 664 252" fill="none" stroke="#fff" stroke-width="3.5" stroke-opacity="0.10" stroke-linecap="round"/>
