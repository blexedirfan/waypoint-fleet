  <path d="M 508 165 L 508 295" stroke="#3A3D44" stroke-width="5"/>

  <!-- Body trim -->
  <path d="M 200 175 L 508 175" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>

  <!-- HEADLIGHT — aggressive truck look -->
  <path d="M 60 225 L 96 210 L 106 226 L 84 240 Z" fill="#FFF8CC" opacity="0.95"/>
  <path d="M 62 218 L 94 207" stroke="#FFE044" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M 53 229 L 33 238 L 35 248 L 54 238 Z" fill="#FFFBE0" opacity="0.18"/>
  <!-- Front bumper (large truck bumper) -->
  <path d="M 58 246 L 98 238 L 98 284 L 56 288 L 52 265 Z" fill="#5A5E66" opacity="0.85"/>
  <!-- Grille -->
  <line x1="61" y1="252" x2="97" y2="246" stroke="#333" stroke-width="2" opacity="0.6"/>
  <line x1="61" y1="260" x2="97" y2="254" stroke="#333" stroke-width="2" opacity="0.6"/>
  <line x1="61" y1="268" x2="97" y2="262" stroke="#333" stroke-width="2" opacity="0.6"/>
  <line x1="61" y1="276" x2="97" y2="270" stroke="#333" stroke-width="2" opacity="0.6"/>
  <!-- Tow hook -->
  <circle cx="72" cy="284" r="5" fill="#444850" opacity="0.9"/>
  <circle cx="72" cy="284" r="3" fill="#333638"/>

  <!-- SKID PLATE -->
  <path d="M 57 280 L 96 274 L 96 290 L 57 290 Z" fill="#48494E" opacity="0.9"/>

