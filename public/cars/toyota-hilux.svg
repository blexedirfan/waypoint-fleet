<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9EA4B0"/>
      <stop offset="38%" stop-color="#7C828F"/>
      <stop offset="100%" stop-color="#52575E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.30"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0D8EC" stop-opacity="0.88"/>
      <stop offset="55%" stop-color="#72A4C8" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#3E78A0" stop-opacity="0.68"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#686D78"/>
      <stop offset="100%" stop-color="#42464E"/>
    </linearGradient>
    <radialGradient id="rim" cx="36%" cy="33%" r="68%">
      <stop offset="0%" stop-color="#B0BBC8"/>
      <stop offset="48%" stop-color="#586272"/>
      <stop offset="100%" stop-color="#10141A"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="430" cy="350" rx="340" ry="16" fill="#000" opacity="0.16"/>

  <!-- PICKUP BED (drawn first, behind cab) -->
  <!-- Bed walls -->
  <path d="
    M 508 165 L 770 165
    C 790 168 804 184 808 208
    C 816 234 816 262 810 284 L 807 295
    L 742 295 Q 680 228 618 295
    L 508 295 L 508 165 Z
  " fill="url(#body)"/>
  <path d="
    M 508 165 L 770 165
    C 790 168 804 184 808 208
    C 816 234 816 262 810 284 L 807 295
    L 742 295 Q 680 228 618 295
    L 508 295 L 508 165 Z
  " fill="url(#shine)"/>
  <!-- Bed inner floor / interior darkness -->
  <path d="M 510 172 L 770 172 L 770 285 L 510 285 Z" fill="url(#bed)" opacity="0.85"/>
  <!-- Bed rails -->
  <path d="M 508 163 L 772 163" stroke="#8A8E98" stroke-width="4" stroke-linecap="square"/>
  <path d="M 508 168 L 772 168" stroke="#606470" stroke-width="2" stroke-linecap="square"/>
  <!-- Bed inner walls -->
  <line x1="512" y1="172" x2="512" y2="284" stroke="#505460" stroke-width="3"/>
  <line x1="770" y1="172" x2="770" y2="284" stroke="#505460" stroke-width="3"/>
  <!-- Tailgate -->
  <path d="M 806 225 L 814 235 L 814 270 L 804 270 L 800 252 Z" fill="#FF1818" opacity="0.92"/>
  <path d="M 806 225 L 814 235 L 814 246 L 808 246 Z" fill="#FF9090" opacity="0.55"/>
  <!-- Bed tie-down rails -->
  <rect x="540" y="173" width="6" height="108" rx="3" fill="#505460" opacity="0.7"/>
  <rect x="640" y="173" width="6" height="108" rx="3" fill="#505460" opacity="0.7"/>
  <rect x="740" y="173" width="6" height="108" rx="3" fill="#505460" opacity="0.7"/>

  <!-- CAB BODY -->
  <path d="
    M 65 295 C 50 276 44 250 58 226
    L 95 200 C 117 184 155 175 196 175
    L 215 150 C 228 132 248 119 272 115
    L 298 94 L 490 92 L 518 115
    L 518 175 L 508 175
    L 508 295
    L 248 295 Q 188 226 128 295 Z
  " fill="url(#body)"/>
  <path d="
    M 65 295 C 50 276 44 250 58 226
    L 95 200 C 117 184 155 175 196 175
    L 215 150 C 228 132 248 119 272 115
    L 298 94 L 490 92 L 518 115
    L 518 175 L 508 175
    L 508 295
    L 248 295 Q 188 226 128 295 Z
  " fill="url(#shine)"/>

  <!-- GLASS (double cab — 2 windows) -->
