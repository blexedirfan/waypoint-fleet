  " fill="url(#glass)"/>
  <path d="M 240 134 L 280 116 L 334 94 L 298 118 Z" fill="#fff" opacity="0.12"/>
  <path d="M 454 92 L 494 92 L 508 120 L 472 120 Z" fill="#fff" opacity="0.08"/>

  <!-- B-pillar (cab) -->
  <path d="M 352 92 L 348 175 L 360 175 L 358 92 Z" fill="#686D78"/>

  <!-- Character line -->
  <path d="M 104 198 Q 310 182 510 184" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2.5" stroke-linecap="round"/>
